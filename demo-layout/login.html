<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Login - Pet Care</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#FDF4E3] flex items-center justify-center h-screen">
    <div class="bg-white p-10 rounded-3xl shadow-xl w-full max-w-md">
        <h2 class="text-3xl font-bold text-[#2D1B14] mb-2 text-center">Bentornato!</h2>
        <p class="text-gray-500 text-center mb-8">Accedi per gestire i tuoi piccoli amici</p>
        
        <form class="space-y-6">
            <div>
                <label class="block text-sm font-semibold mb-2">Email</label>
                <input type="email" class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-orange-500 outline-none" placeholder="tua@email.com">
            </div>
            <div>
                <label class="block text-sm font-semibold mb-2">Password</label>
                <input type="password" class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-orange-500 outline-none" placeholder="••••••••">
            </div>
            <button class="w-full bg-[#2D1B14] text-white p-3 rounded-xl font-bold hover:bg-opacity-90 transition">Login</button>
        </form>
        <p class="mt-6 text-center text-sm">Non hai un account? <a href="register.html" class="text-orange-600 font-bold">Registrati</a></p>
    </div>
</body>
</html>
