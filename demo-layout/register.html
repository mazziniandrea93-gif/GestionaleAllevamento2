<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Registrazione - Pet Care</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#FDF4E3] flex items-center justify-center h-screen">
    <div class="bg-white p-10 rounded-3xl shadow-xl w-full max-w-md">
        <h2 class="text-3xl font-bold text-[#2D1B14] mb-2 text-center">Crea un Account</h2>
        <p class="text-gray-500 text-center mb-8">Inizia a prenderti cura dei tuoi pet</p>
        
        <form class="space-y-4">
            <div>
                <label class="block text-sm font-semibold mb-1">Nome Completo</label>
                <input type="text" class="w-full p-3 border rounded-xl outline-none" placeholder="Mario Rossi">
            </div>
            <div>
                <label class="block text-sm font-semibold mb-1">Email</label>
                <input type="email" class="w-full p-3 border rounded-xl outline-none" placeholder="mario@email.com">
            </div>
            <div>
                <label class="block text-sm font-semibold mb-1">Password</label>
                <input type="password" class="w-full p-3 border rounded-xl outline-none" placeholder="••••••••">
            </div>
            <button class="w-full bg-orange-500 text-white p-3 rounded-xl font-bold hover:bg-orange-600 transition">Registrati Ora</button>
        </form>
        <p class="mt-6 text-center text-sm">Hai già un account? <a href="login.html" class="text-[#2D1B14] font-bold">Accedi</a></p>
    </div>
</body>
</html>
